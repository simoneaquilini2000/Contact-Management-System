<div class="min-h-screen bg-slate-900 flex items-center justify-center px-4">
  <div class="w-full max-w-md">

    <!-- Logo / title -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-white tracking-tight">Welcome back</h1>
      <p class="text-slate-400 mt-2 text-sm">Sign in to your account</p>
    </div>

    <!-- Card -->
    <div class="bg-slate-800 rounded-2xl shadow-xl p-8 border border-slate-700">
      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

        <!-- Email -->
        <div class="mb-5">
          <label class="block text-sm font-medium text-slate-300 mb-1.5">
            Email
          </label>
          <input
            type="email"
            formControlName="email"
            placeholder="you@example.com"
            class="w-full px-4 py-2.5 rounded-lg bg-slate-700 border border-slate-600
                   text-white placeholder-slate-400 text-sm
                   focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent
                   transition duration-150"
          />
          <p
            class="mt-1.5 text-xs text-red-400"
            *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
            Please enter a valid email address
          </p>
        </div>

        <!-- Password -->
        <div class="mb-6">
          <label class="block text-sm font-medium text-slate-300 mb-1.5">
            Password
          </label>
          <input
            type="password"
            formControlName="password"
            placeholder="••••••••"
            class="w-full px-4 py-2.5 rounded-lg bg-slate-700 border border-slate-600
                   text-white placeholder-slate-400 text-sm
                   focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent
                   transition duration-150"
          />
          <p
            class="mt-1.5 text-xs text-red-400"
            *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
            Password must be at least 8 characters
          </p>
        </div>

        <!-- API error -->
        <div
          class="mb-4 px-4 py-3 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-sm"
          *ngIf="error">
          {{ error }}
        </div>

        <!-- Submit -->
        <button
          type="submit"
          [disabled]="loading"
          class="w-full py-2.5 px-4 rounded-lg font-semibold text-sm
                 bg-indigo-600 hover:bg-indigo-500 text-white
                 disabled:opacity-50 disabled:cursor-not-allowed
                 transition duration-150 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 focus:ring-offset-slate-800">
          <span *ngIf="!loading">Sign in</span>
          <span *ngIf="loading" class="flex items-center justify-center gap-2">
            <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
            </svg>
            Signing in...
          </span>
        </button>

      </form>
    </div>
  </div>
</div>
