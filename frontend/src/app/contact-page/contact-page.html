<div class="min-h-screen bg-slate-900 flex flex-col">

  <!-- NavBar with user info and logout button -->
  <nav class="w-full bg-slate-800 border-b border-slate-700 px-6 h-14 flex items-center justify-between">

    <div class="flex items-center gap-2 text-slate-100 font-medium text-sm">
      Contact Management System
    </div>

    <div class="flex items-center gap-4">
      <span *ngIf="userInfo" class="text-slate-400 text-sm">Welcome back, {{ userInfo.name }}</span>
      <button
        (click)="logout()"
        class="flex items-center gap-2 px-4 py-1.5 rounded-lg border border-slate-600
              text-slate-300 text-sm hover:bg-slate-700 hover:border-slate-500
              transition duration-150">
        Logout &rarr;
      </button>
    </div>

  </nav>

  <!-- Action buttons -->
  <div class="flex items-center gap-2 mb-2 mt-4 ml-4">

    <button
      (click)="openContactForm('create')"
      class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium
            bg-indigo-600 hover:bg-indigo-500 text-white border border-indigo-500
            transition duration-150">
      + Create new
    </button>

    <button
      [disabled]="!selectedContactId"
      (click)="openContactForm('update')"
      class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm
            bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-600
            transition duration-150 hover:enabled:bg-slate-700
         disabled:opacity-50 disabled:cursor-not-allowed disabled:text-slate-500
         disabled:border-slate-700">
      Edit
    </button>

    <button
      [disabled]="!selectedContactId"
      (click)="deleteContact(selectedContactId)"
      class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm
            bg-slate-800 hover:bg-red-900/20 text-red-400 border border-slate-600
            hover:border-red-500/30 transition duration-150 hover:enabled:bg-red-900/20
         disabled:opacity-50 disabled:cursor-not-allowed disabled:text-red-500
         disabled:border-red-700">
      Delete
    </button>
  </div>


  <!-- Contact table -->

  <div class="ml-2 mr-2 rounded-xl border border-slate-700 overflow-hidden mt-4">

    <table class="w-full table-fixed border-collapse">

      <thead class="bg-slate-800 border-b border-slate-700">
        <tr>
          <th class="w-1/3 px-4 py-3 text-left text-xs font-medium text-slate-400 uppercase tracking-wider">
            Name
          </th>
          <th class="w-1/3 px-4 py-3 text-left text-xs font-medium text-slate-400 uppercase tracking-wider">
            Surname
          </th>
          <th class="w-1/3 px-4 py-3 text-left text-xs font-medium text-slate-400 uppercase tracking-wider">
            Phone number
          </th>
        </tr>
      </thead>

      <tbody class="bg-slate-900 divide-y divide-slate-800">

        <tr *ngIf="userContacts.length === 0">
          <td colspan="4" class="px-4 py-10 text-center text-slate-500 text-sm">
            No contacts found
          </td>
        </tr>

        <tr
          *ngFor="let contact of userContacts"
          [class.bg-indigo-950]="selectedContactId === contact.id"
          (click)="selectContact(contact.id)"
          class="hover:bg-slate-800 transition duration-100 cursor-pointer">

          <td class="w-1/3 px-4 py-3">
            <div class="flex items-center gap-3">
              <span class="text-slate-200 text-sm">{{ contact.name }}</span>
            </div>
          </td>

          <td class="w-1/3 px-4 py-3 text-slate-300 text-sm">
            {{ contact.surname }}
          </td>

          <td class="w-1/3 px-4 py-3 text-slate-400 text-sm">
            {{ contact.phone }}
          </td>

        </tr>
      </tbody>

    </table>
  </div>

  
  <!-- Contact form enabling-->
  <app-contact-form *ngIf="contactFormEnabled" [contactId]="selectedContactId" [action]="action" (closedContactForm)="onClosedContactForm($event)"/>
</div>
