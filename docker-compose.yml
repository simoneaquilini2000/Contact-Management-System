services:

  # ──────────────────────────────────────────────
  # PostgreSQL
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - ./db/scripts:/docker-entrypoint-initdb.d:ro   # *.sql / *.sh run in alphabetical order
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appuser} -d ${POSTGRES_DB:-appdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ──────────────────────────────────────────────
  # Keycloak (authorization server)
  # ──────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    restart: unless-stopped
    command: start-dev          # use 'start' + TLS in production
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8180
      KC_LOG_LEVEL: INFO 
    ports:
      - "8180:8180"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8180/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - backend
  #     - frontend

  # ──────────────────────────────────────────────
  # Spring Boot REST service
  # ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend                 # folder containing pom.xml
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-appdb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-appuser}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8180/realms/contact-management-system
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8180/realms/contact-management-system/protocol/openid-connect/certs
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      # keycloak:
      #   condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 45s
    networks:
      - backend
      - frontend

  # ──────────────────────────────────────────────
  # Angular frontend (served by Nginx)
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend                # folder containing package.json / angular.json
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    environment:
      KEYCLOAK_URL: http://localhost:8180
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-contact-management-system}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-contact-management-spring-boot}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-GZblE8M3oCC0gSqrYWLrNcIpK1ialWEQ}
      API_URL: http://localhost:8080
    ports:
      - "4222:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - frontend

# ──────────────────────────────────────────────
# Named volumes
# ──────────────────────────────────────────────
volumes:
  postgres_data:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge